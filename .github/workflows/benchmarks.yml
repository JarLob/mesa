name: Performance benchmarks

on:
  pull_request:
    types: [opened, ready_for_review, labeled]
    branches:
      - main

jobs:
  run-benchmarks:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Run compare timings and encode output
        working-directory: benchmarks
        id: compare_timings
        run: |
          TIMING_COMPARISON=$(echo "test" | base64 -w 0)  # Base64 encode the output
          echo "$TIMING_COMPARISON" >> ${{ runner.temp }}/timing_comparison.base64
      - name: Upload timing comparison as artifact
        uses: actions/upload-artifact@v7
        with:
          name: timing_comparison
          path: ${{ runner.temp }}/timing_comparison.base64
          if-no-files-found: error
