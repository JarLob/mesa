name: Performance benchmarks

on:
  pull_request:
    branches:
      - main

jobs:
  run-benchmarks:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Run compare timings and encode output
        # working-directory: benchmarks
        run: |
          TIMING_COMPARISON=$(echo "abc")
          mkdir -p ./benchmarks
          echo $TIMING_COMPARISON >> ./benchmarks/timing
      - uses: actions/upload-artifact@v7
        with:
          name: benchmarks
          path: benchmarks/
          if-no-files-found: error
